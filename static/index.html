<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Augment_Chess</title>
    <style>
        #topbar,
        #colorBox,
        #status,
        #gameArea,
        #boardWrap,
        #clockPanel,
        .clock-box,
        #modalTitle,
        .modal-card,
        button {
            -webkit-user-select: none;
            user-select: none;
            -webkit-user-drag: none;
        }

        #roomBox {
            -webkit-user-select: text;
            user-select: text;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 24px 16px 20px;
            min-height: 100vh;
            box-sizing: border-box;
            background: #222;
            color: white;
            font-family: Arial, sans-serif;
            overflow-x: hidden;
        }

        #topbar {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 14px;
            flex-wrap: wrap;
            justify-content: center;
        }

        #roomBox,
        #colorBox,
        #status,
        .clock-box,
        .modal-card {
            background: white;
            color: black;
            border-radius: 10px;
        }

        #roomBox,
        #colorBox {
            font-size: 16px;
            padding: 10px 14px;
        }

        #status {
            font-size: 20px;
            font-weight: bold;
            padding: 10px 18px;
            min-width: 220px;
            text-align: center;
            margin-bottom: 16px;
        }

        button,
        input {
            font-size: 16px;
            padding: 8px 12px;
            border-radius: 8px;
            border: none;
        }

        input {
            -webkit-user-select: text;
            user-select: text;
        }

        /* ===== 메인 레이아웃 ===== */
        #gameArea {
            position: relative;
            width: 100%;
            height: 600px;
        }

        #leftAugmentColumn {
            z-index: 1;
        }

        #leftAugmentColumn {
            position: absolute;
            top: 50%;
            left: calc(50% - 600px);
            /* ← 여기로 거리 조절 */
            transform: translateY(-50%);

            width: 300px;
            height: 564px;

            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .augment-group {
            width: 320px;
            display: grid;
            grid-template-columns: repeat(3, 82px);
            grid-template-rows: repeat(2, 118px);
            column-gap: 12px;
            row-gap: 14px;
            justify-content: start;
        }

        .owned-augment-slot {
            width: 82px;
            height: 118px;
            border: 3px solid rgba(255, 255, 255, 0.35);
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.04);
            box-sizing: border-box;
            cursor: default;
            position: relative;
            overflow: hidden;
            padding: 6px;
        }

        .owned-augment-slot.filled {
            cursor: pointer;
            pointer-events: auto;
            z-index: 5;
        }

        .owned-augment-slot.filled * {
            pointer-events: none;
        }

        .owned-augment-slot.silver {
            background: linear-gradient(180deg, #5f656d 0%, #8b939d 28%, #bbc3cc 62%, #eef2f6 100%);
        }

        .owned-augment-slot.gold {
            background: linear-gradient(180deg, #8c6700 0%, #c99708 26%, #f0c840 58%, #fff0b0 100%);
        }

        .owned-augment-slot.diamond {
            background: linear-gradient(180deg, #0a5f7f 0%, #1494c0 26%, #43c9ee 58%, #dcfcff 100%);
        }

        .owned-augment-mini-title {
            position: absolute;
            top: 6px;
            left: 6px;
            right: 6px;
            font-size: 10px;
            font-weight: 900;
            line-height: 1.05;
            word-break: keep-all;
            color: #111;
            z-index: 2;
        }

        .owned-augment-mini-art {
            position: absolute;
            left: 4px;
            right: 4px;
            bottom: 4px;
            top: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            overflow: hidden;
        }

        .owned-augment-mini-icon {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
            border-radius: 14px;
        }

        /* ===== 먹은 증강 상세 보기 ===== */
        #ownedAugmentOverlay {
            position: fixed;
            inset: 0;
            display: none;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.82);
            backdrop-filter: blur(4px);
            z-index: 10001;
        }

        #ownedAugmentOverlay.show {
            display: flex;
        }

        #ownedAugmentCard {
            width: 370px;
            height: 450px;
            border-radius: 30px;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
            display: flex;
            flex-direction: column;
        }

        #ownedAugmentCard.silver {
            background: linear-gradient(180deg, #5f656d 0%, #8b939d 28%, #bbc3cc 62%, #eef2f6 100%);
            color: #11161b;
        }

        #ownedAugmentCard.gold {
            background: linear-gradient(180deg, #8c6700 0%, #c99708 26%, #f0c840 58%, #fff0b0 100%);
            color: #221700;
        }

        #ownedAugmentCard.diamond {
            background: linear-gradient(180deg, #0a5f7f 0%, #1494c0 26%, #43c9ee 58%, #dcfcff 100%);
            color: #07181d;
        }

        #ownedAugmentClose {
            position: fixed;
            top: 28px;
            right: 34px;
            width: 68px;
            height: 68px;
            border: none;
            border-radius: 16px;
            font-size: 36px;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.18);
            color: white;
            cursor: pointer;
        }

        #ownedAugmentTitle {
            min-height: 70px;
            font-size: 34px;
            font-weight: 900;
            line-height: 1.05;
            word-break: keep-all;
            letter-spacing: -1px;
            margin: 0 0 12px 0;
            white-space: pre-line;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
        }

        #ownedAugmentDesc {
            flex: 1;
            min-height: 0;
            font-size: 22px;
            font-weight: 900;
            line-height: 1.18;
            word-break: keep-all;
            letter-spacing: -0.5px;
            background: rgba(255, 255, 255, 0.92);
            border-radius: 22px;
            padding: 18px;
            color: #222;
            box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.55);
            white-space: pre-line;
            display: flex;
            align-items: flex-start;
            overflow: hidden;
        }

        #ownedAugmentArt {
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            border-radius: 22px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.06);
            box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.10);
            flex-shrink: 0;
        }

        .owned-augment-big-icon {
            width: calc(100% - 32px);
            height: calc(100% - 32px);
            object-fit: cover;
            border-radius: 16px;
            display: block;
        }

        /* ===== 보드 ===== */
        #boardWrap {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 564px;
            height: 564px;
            z-index: 1;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(8, 70px);
            grid-template-rows: repeat(8, 70px);
            width: 560px;
            height: 560px;
            border: 2px solid white;
            box-sizing: content-box;
            position: relative;
            z-index: 1;
        }

        .cell {
            width: 70px;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .white {
            background: #f0d9b5;
        }

        .black {
            background: #b58863;
        }

        .selected {
            box-shadow: inset 0 0 0 4px red;
        }

        .move-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: rgba(0, 255, 0, 0.85);
            position: absolute;
        }

        .capture-ring {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 4px solid orange;
            box-sizing: border-box;
            position: absolute;
        }

        .check-king {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: rgba(255, 0, 0, 0.45);
            position: absolute;
            z-index: 1;
        }

        .winner-king {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: rgba(144, 238, 144, 0.8);
            position: absolute;
            z-index: 1;
        }

        img {
            width: 52px;
            height: 52px;
            pointer-events: none;
            position: relative;
            z-index: 2;
            -webkit-user-drag: none;
            user-select: none;
        }

        /* ===== 오른쪽 시계 ===== */
        #rightSidePanel {
            position: absolute;
            top: 50%;
            left: calc(50% + 320px);
            transform: translateY(-50%);
            width: 130px;
            height: 564px;
            z-index: 1;
        }

        #clockPanel {
            width: 130px;
            height: 564px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        .clock-box {
            font-size: 18px;
            font-weight: bold;
            padding: 12px 16px;
            min-width: 104px;
            text-align: center;
        }

        /* ===== 게임오버 모달 ===== */
        #gameOverModal {
            position: absolute;
            inset: 0;
            display: none;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.45);
            z-index: 100;
        }

        #gameOverModal.show {
            display: flex;
        }

        .modal-card {
            padding: 20px 24px;
            min-width: 240px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
            position: relative;
            z-index: 101;
        }

        #modalTitle {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 16px;
        }

        .modal-actions {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .modal-actions button {
            min-width: 96px;
        }

        /* ===== 증강 오버레이 ===== */
        #augmentOverlay {
            position: fixed;
            inset: 0;
            display: none;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.88);
            backdrop-filter: blur(4px);
            z-index: 1000;
            overflow: hidden;
        }

        #augmentOverlay.show {
            display: flex;
        }

        #augmentPanel {
            position: relative;
            width: 100vw;
            height: 100vh;
            pointer-events: auto;
            z-index: 10000;
        }

        #augmentStatus {
            position: absolute;
            top: 28px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            color: black;
            border-radius: 12px;
            padding: 12px 22px;
            font-size: 22px;
            font-weight: bold;
            min-width: 280px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
            z-index: 2;
        }

        #augmentTimer {
            position: absolute;
            top: 102px;
            left: 50%;
            transform: translateX(-50%);
            width: min(820px, 72vw);
            height: 18px;
            background: rgba(255, 255, 255, 0.16);
            border-radius: 999px;
            overflow: hidden;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
            z-index: 2;
        }

        #augmentBar {
            width: 100%;
            height: 100%;
            border-radius: 999px;
            transform-origin: left center;
        }

        #augmentBar.silver {
            background: linear-gradient(90deg, #6c6f76 0%, #9197a3 40%, #c4cad2 70%, #eceff4 100%);
        }

        #augmentBar.gold {
            background: linear-gradient(90deg, #8f6a00 0%, #c89a06 35%, #f2c94c 68%, #fff0a8 100%);
        }

        #augmentBar.diamond {
            background: linear-gradient(90deg, #056d91 0%, #1497c7 35%, #37c4ea 70%, #d5fbff 100%);
        }

        #augmentCards {
            position: absolute;
            top: 220px;
            left: 50%;
            transform: translateX(-50%);
            width: min(980px, 92vw);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 100px;
            flex-wrap: nowrap;
            margin-top: 0;
            z-index: 2;
        }

        #guardianOverlay {
            position: fixed;
            inset: 0;
            display: none;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.78);
            z-index: 2000;
        }

        #guardianOverlay.show {
            display: flex;
        }

        #guardianPanel {
            background: white;
            color: black;
            border-radius: 16px;
            padding: 20px 24px;
            min-width: 320px;
            text-align: center;
        }

        #guardianStatus {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 12px;
        }

        #guardianScore {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 14px;
        }

        .augment-card {
            width: 370px;
            height: 450px;
            border-radius: 30px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            border: 3px solid rgba(255, 255, 255, 0.24);
            box-shadow: 0 16px 36px rgba(0, 0, 0, 0.34);
            transition:
                transform 0.38s cubic-bezier(0.18, 0.9, 0.25, 1.28),
                box-shadow 0.22s ease,
                border-color 0.22s ease,
                filter 0.22s ease,
                opacity 0.30s ease;
            transform: translateY(34px) scale(0.68);
            opacity: 0;
            filter: saturate(0.96);
            color: #201500;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .augment-card.show {
            transform: translateY(0) scale(1);
            opacity: 1;
        }

        .augment-card:hover {
            transform: translateY(-8px) scale(1.03);
            box-shadow: 0 24px 54px rgba(0, 0, 0, 0.48);
            border-color: rgba(255, 255, 255, 0.44);
            filter: saturate(1.03);
        }

        .augment-card.disabled {
            pointer-events: none;
            opacity: 0.65;
            filter: grayscale(0.15);
        }

        .augment-card.selected-card {
            outline: 4px solid rgba(255, 255, 255, 0.95);
            transform: translateY(-10px) scale(1.06);
            box-shadow:
                0 0 0 3px rgba(255, 255, 255, 0.18),
                0 0 26px rgba(255, 255, 255, 0.35),
                0 22px 48px rgba(0, 0, 0, 0.48);
            filter: saturate(1.12) brightness(1.04);
        }

        .augment-card::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at top center, rgba(255, 255, 255, 0.20), transparent 34%),
                linear-gradient(180deg, rgba(255, 255, 255, 0.05), transparent 28%);
            pointer-events: none;
        }

        .augment-card::after {
            content: "";
            position: absolute;
            inset: -18%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.16), transparent 58%);
            opacity: 0;
            transition: opacity 0.30s ease;
            pointer-events: none;
        }

        .augment-card.show::after {
            opacity: 1;
        }

        .turn-counter-box {
            background: white;
            color: black;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            padding: 12px 16px;
            min-width: 104px;
            text-align: center;
        }

        .augment-card.silver {
            background: linear-gradient(180deg, #5f656d 0%, #8b939d 28%, #bbc3cc 62%, #eef2f6 100%);
            color: #11161b;
        }

        .augment-card.gold {
            background: linear-gradient(180deg, #8c6700 0%, #c99708 26%, #f0c840 58%, #fff0b0 100%);
            color: #221700;
        }

        .augment-card.diamond {
            background: linear-gradient(180deg, #0a5f7f 0%, #1494c0 26%, #43c9ee 58%, #dcfcff 100%);
            color: #07181d;
        }

        .augment-card-header,
        .augment-tier-badge,
        .augment-card-index {
            display: none;
        }

        .augment-card-body {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-rows: 70px 160px 1fr;
            /* ⬅️ 핵심 */
            row-gap: 12px;
            height: 100%;
            padding: 0;
        }

        .augment-card-title {
            font-size: 34px;
            font-weight: 900;
            line-height: 1.05;
            word-break: keep-all;
            letter-spacing: -1px;
            margin: 0;
            white-space: pre-line;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
        }

        .augment-card-desc {
            font-size: 22px;
            font-weight: 900;
            line-height: 1.18;
            word-break: keep-all;
            letter-spacing: -0.5px;
            color: #2a1d00;
            background: rgba(255, 255, 255, 0.92);
            border-radius: 22px;
            padding: 18px;
            box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.55);
            margin: 0;
            white-space: pre-line;
            display: flex;
            align-items: flex-start;
        }

        .augment-card-art {
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.06);
            box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.10);
            min-height: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .augment-card-icon {
            width: calc(100% - 32px);
            height: calc(100% - 32px);
            object-fit: cover;
            border-radius: 16px;
            display: block;
        }

        .augment-auto-text {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.92);
            text-align: center;
            margin-top: 2px;
        }

        #augmentDebugBtn {
            position: fixed;
            right: 14px;
            bottom: 14px;
            z-index: 30;
            opacity: 0.6;
        }

        #augmentDebugBtn:hover {
            opacity: 1;
        }

        /* ===== 반응형 ===== */
        @media (max-width: 1280px) {
            #gameArea {
                width: min(100%, 1320px);
                grid-template-columns: 280px 564px 118px;
                column-gap: 42px;
            }

            #leftAugmentColumn {
                width: 280px;
                align-items: flex-start;
                padding-left: 6px;
                box-sizing: border-box;
            }

            .augment-group {
                width: 280px;
                grid-template-columns: repeat(3, 74px);
                grid-template-rows: repeat(2, 106px);
                column-gap: 10px;
                row-gap: 12px;
                justify-content: start;
            }

            .owned-augment-slot {
                width: 74px;
                height: 106px;
                padding: 5px;
            }

            .owned-augment-mini-title {
                font-size: 9px;
                top: 5px;
                left: 5px;
                right: 5px;
            }

            .owned-augment-mini-art {
                top: 24px;
                left: 4px;
                right: 4px;
                bottom: 4px;
            }

            .owned-augment-mini-icon {
                width: 44px;
                height: 44px;
            }

            #rightSidePanel,
            #clockPanel {
                width: 118px;
            }

            .clock-box {
                min-width: 90px;
                font-size: 18px;
                padding: 10px 12px;
            }
        }

        @media (max-width: 900px) {
            #gameArea {
                width: 100%;
                min-height: auto;
                display: flex;
                flex-direction: column;
                gap: 18px;
            }

            #leftAugmentColumn,
            #rightSidePanel {
                width: 100%;
                height: auto;
            }

            #leftAugmentColumn {
                order: 2;
                gap: 18px;
            }

            .augment-group {
                width: 100%;
                grid-template-columns: repeat(3, 64px);
                grid-template-rows: repeat(2, 92px);
                justify-content: center;
            }

            .owned-augment-slot {
                width: 64px;
                height: 92px;
            }

            #boardWrap {
                order: 1;
                width: auto;
                height: auto;
            }

            #rightSidePanel {
                order: 3;
            }

            #clockPanel {
                height: auto;
                width: 100%;
                flex-direction: row;
                justify-content: center;
                gap: 12px;
            }

            #board {
                grid-template-columns: repeat(8, min(11vw, 56px));
                grid-template-rows: repeat(8, min(11vw, 56px));
                width: auto;
                height: auto;
            }

            .cell {
                width: min(11vw, 56px);
                height: min(11vw, 56px);
            }

            img {
                width: min(8vw, 42px);
                height: min(8vw, 42px);
            }

            #augmentStatus {
                top: 52px;
                min-width: min(88vw, 360px);
                font-size: 22px;
                padding: 14px 22px;
            }

            #augmentTimer {
                top: 126px;
                width: min(88vw, 820px);
            }

            #augmentCards {
                margin-top: 200px;
                flex-direction: column;
                align-items: center;
                gap: 18px;
            }

            .augment-card {
                width: min(84vw, 260px);
                height: 390px;
            }

            .augment-card-body {
                grid-template-rows: 66px 1fr 110px;
            }

            .augment-card-title {
                font-size: 26px;
            }

            .augment-card-desc {
                font-size: 16px;
            }
        }
    </style>
</head>

<body>
    <div id="topbar">
        <button onclick="createRoom()">방 만들기</button>
        <input id="roomInput" placeholder="방 코드 입력">
        <button onclick="joinRoom()">방 참가</button>
        <div id="roomBox">방: 없음</div>
        <div id="colorBox">내 색: 없음</div>
    </div>

    <div id="status">방을 만들거나 참가해</div>

    <div id="gameArea">
        <div id="leftAugmentColumn">
            <div class="augment-group">
                <div class="owned-augment-slot enemy-slot" data-side="enemy" data-index="0"></div>
                <div class="owned-augment-slot enemy-slot" data-side="enemy" data-index="1"></div>
                <div class="owned-augment-slot enemy-slot" data-side="enemy" data-index="2"></div>
                <div class="owned-augment-slot enemy-slot" data-side="enemy" data-index="3"></div>
                <div class="owned-augment-slot enemy-slot" data-side="enemy" data-index="4"></div>
                <div class="owned-augment-slot enemy-slot" data-side="enemy" data-index="5"></div>
            </div>

            <div class="augment-group">
                <div class="owned-augment-slot my-slot" data-side="my" data-index="0"></div>
                <div class="owned-augment-slot my-slot" data-side="my" data-index="1"></div>
                <div class="owned-augment-slot my-slot" data-side="my" data-index="2"></div>
                <div class="owned-augment-slot my-slot" data-side="my" data-index="3"></div>
                <div class="owned-augment-slot my-slot" data-side="my" data-index="4"></div>
                <div class="owned-augment-slot my-slot" data-side="my" data-index="5"></div>
            </div>
        </div>

        <div id="boardWrap">
            <div id="board"></div>

            <div id="gameOverModal">
                <div class="modal-card">
                    <div id="modalTitle">게임 종료</div>
                    <div class="modal-actions">
                        <button id="rematchBtn" onclick="requestRematch()">재대결 (0/2)</button>
                        <button onclick="leaveRoom()">나가기</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="rightSidePanel">
            <div id="clockPanel">
                <div id="topClock" class="clock-box">흑 10:00</div>
                <div id="turnCounter" class="turn-counter-box">턴 수 : 0</div>
                <div id="bottomClock" class="clock-box">백 10:00</div>
            </div>
        </div>    

        <div id="augmentOverlay">
                <div id="augmentPanel">
                    <div id="augmentStatus">증강을 선택하세요</div>

                    <div id="augmentTimer">
                        <div id="augmentBar" class="silver"></div>
                    </div>
                    <div id="guardianOverlay" style="display:none;">
                        <div id="guardianPanel">
                            <div id="guardianStatus">균형의 수호자 진행 중</div>
                            <div id="guardianScore">점수: 0 / 0</div>
                            <button id="guardianConfirmBtn" onclick="confirmGuardian()" disabled>확인</button>
                        </div>
                    </div>
                    <div id="augmentCards"></div>
                </div>
            </div>

            <button id="augmentDebugBtn" onclick="openDebugAugment()">증강 테스트</button>

            <script>
                const API_BASE = "";

                let selected = null;
                let currentBoard = null;
                let currentState = null;
                let roomId = null;
                let playerId = null;
                let myColor = null;
                let gameEnded = false;
                let socket = null;
                let clockTicker = null;

                /* ===== augment state ===== */
                let augmentTimerId = null;
                let augmentAutoPickId = null;
                let augmentOpen = false;
                let augmentLocked = false;
                let selectedAugmentIndex = null;
                let augmentShownThisGame = false;
                let augmentCloseTimeout = null;
                let ownedAugments = [];
                let enemyOwnedAugments = [];
                let myOwnedAugments = [];
                let guardianMode = false;
                let guardianState = null;

                const DEBUG_AUGMENTS = [
                    {
                        tier: "silver",
                        title: "전장의 안개",
                        description: "상대는 네 기물이 이동 가능한 칸만 볼 수 있습니다."
                    },
                    {
                        tier: "gold",
                        title: "언더 프로모션!!",
                        description: "상대는 퀸으로 프로모션 할 수 없습니다."
                    },
                    {
                        tier: "diamond",
                        title: "왕의 각성",
                        description: "왕이 주변 한 칸에서 킹처럼 더 날카롭게 전장을 통제합니다."
                    }
                ];

                function closeOwnedAugmentDetail() {
                    const overlay = document.getElementById("ownedAugmentOverlay");
                    if (overlay) {
                        overlay.classList.remove("show");
                    }
                }

                function hideAugmentOverlay() {
                    const overlay = document.getElementById("augmentOverlay");
                    const cards = document.getElementById("augmentCards");
                    const bar = document.getElementById("augmentBar");

                    clearAugmentTimer();

                    if (augmentCloseTimeout) {
                        clearTimeout(augmentCloseTimeout);
                        augmentCloseTimeout = null;
                    }

                    if (overlay) {
                        overlay.classList.remove("show");
                        overlay.style.display = "";
                    }

                    if (cards) {
                        cards.innerHTML = "";
                    }

                    if (bar) {
                        bar.style.transition = "none";
                        bar.style.width = "100%";
                    }

                    augmentOpen = false;
                    augmentLocked = false;
                    selectedAugmentIndex = null;

                    const statusEl = document.getElementById("augmentStatus");
                    if (statusEl) statusEl.innerText = "증강을 선택하세요";
                }

                function updateRematchButton(rematch) {
                    const btn = document.getElementById("rematchBtn");
                    if (!btn) return;

                    const count = Number(rematch?.count ?? 0);
                    btn.innerText = `재대결 (${count}/2)`;

                    if (!gameEnded) {
                        btn.disabled = true;
                        return;
                    }

                    if (myColor !== "W" && myColor !== "B") {
                        btn.disabled = true;
                        return;
                    }

                    const voted = !!rematch?.votes?.[myColor];
                    btn.disabled = voted;
                }

                function connectSocket() {
                    if (!roomId) return;

                    if (socket) {
                        socket.onclose = null;
                        socket.close();
                    }

                    const wsProtocol = location.protocol === "https:" ? "wss" : "ws";
                    socket = new WebSocket(`${wsProtocol}://${location.host}/ws/${roomId}`);

                    socket.onmessage = (event) => {
                        const data = JSON.parse(event.data);

                        if (data.type === "update" || data.type === "rematch_vote") {
                            renderBoardFromState(data.state);
                        }

                        if (data.type === "augment_prompt") {
                            showAugmentOverlay({
                                tier: data.tier,
                                myTurn: data.player_color === myColor,
                                options: data.options,
                                durationMs: data.duration_ms ?? 25000
                            });
                        }

                        if (data.type === "augment_wait") {
                            setAugmentWaiting(true);
                        }
                    };

                    socket.onclose = () => {
                        if (!roomId) return;
                        setTimeout(connectSocket, 1000);
                    };
                }

                function displayToBoard(x, y) {
                    if (myColor === "B") return { x: 7 - x, y: 7 - y };
                    return { x, y };
                }

                function ensurePlayerId() {
                    let saved = sessionStorage.getItem("augment_chess_player_id");
                    if (!saved) {
                        saved = crypto.randomUUID();
                        sessionStorage.setItem("augment_chess_player_id", saved);
                    }
                    playerId = saved;
                }

                function getRoomFromUrl() {
                    const params = new URLSearchParams(window.location.search);
                    return params.get("room");
                }

                function setRoomToUrl(newRoomId) {
                    const url = new URL(window.location.href);
                    if (newRoomId) url.searchParams.set("room", newRoomId);
                    else url.searchParams.delete("room");
                    window.history.replaceState({}, "", url);
                }

                function updateRoomBox() {
                    document.getElementById("roomBox").innerText = roomId ? `방: ${roomId}` : "방: 없음";
                }

                function updateColorBox() {
                    let text = "내 색: 없음";
                    if (myColor === "W") text = "내 색: 백";
                    if (myColor === "B") text = "내 색: 흑";
                    if (myColor === "S") text = "내 색: 관전";
                    document.getElementById("colorBox").innerText = text;
                }

                function formatTime(sec) {
                    sec = Math.max(0, Math.floor(sec));

                    const m = Math.floor(sec / 60);
                    const s = sec % 60;

                    return `${m}:${s.toString().padStart(2, "0")}`;
                }

                function setClockUI(clock) {
                    if (!clock) return;

                    let w = Number(clock.W ?? 0);
                    let b = Number(clock.B ?? 0);

                    if (!clock.ended && clock.running && clock.last_update) {
                        const now = Date.now() / 1000;
                        const elapsed = Math.max(0, now - Number(clock.last_update));

                        if (clock.running === "W") w -= elapsed;
                        if (clock.running === "B") b -= elapsed;
                    }

                    w = Math.max(0, w);
                    b = Math.max(0, b);

                    const top = document.getElementById("topClock");
                    const bottom = document.getElementById("bottomClock");

                    if (myColor === "B") {
                        top.innerText = `백 ${formatTime(w)}`;
                        bottom.innerText = `흑 ${formatTime(b)}`;
                        top.style.color = w <= 10 ? "red" : "black";
                        bottom.style.color = b <= 10 ? "red" : "black";
                    } else {
                        top.innerText = `흑 ${formatTime(b)}`;
                        bottom.innerText = `백 ${formatTime(w)}`;
                        top.style.color = b <= 10 ? "red" : "black";
                        bottom.style.color = w <= 10 ? "red" : "black";
                    }
                }

                function startClockTicker() {
                    if (clockTicker) clearInterval(clockTicker);

                    clockTicker = setInterval(() => {
                        if (!currentState || !currentState.clock) return;
                        setClockUI(currentState.clock);
                    }, 200);
                }

                function stopClockTicker() {
                    if (clockTicker) {
                        clearInterval(clockTicker);
                        clockTicker = null;
                    }
                }

                function showGameOverModal(text) {
                    document.getElementById("modalTitle").innerText = text;
                    document.getElementById("gameOverModal").classList.add("show");
                }

                function hideGameOverModal() {
                    document.getElementById("gameOverModal").classList.remove("show");
                }

                function setStatusUI(data) {
                    const status = document.getElementById("status");
                    const gameState = data.game_state;
                    let text = "";
                    let endedNow = false;

                    if (data.clock?.ended) {
                        endedNow = true;
                        text = `${data.clock.winner === "W" ? "백" : "흑"} 시간 승리`;
                    } else if (gameState.checkmate) {
                        endedNow = true;
                        text = data.winner === "W" ? "백 승리" : "흑 승리";
                    } else if (gameState.winner) {
                        endedNow = true;
                        if (gameState.special_win === "countdown") {
                            text = data.winner === "W" ? "백 승리 - 종말의 카운트다운" : "흑 승리 - 종말의 카운트다운";
                        } else {
                            text = data.winner === "W" ? "백 승리" : "흑 승리";
                        }
                    } else if (gameState.draw) {
                        endedNow = true;
                        if (gameState.draw_reason === "stalemate") text = "스테일메이트";
                        else if (gameState.draw_reason === "fifty_move") text = "50수 무승부";
                        else if (gameState.draw_reason === "threefold_repetition") text = "3수 동형";
                        else if (gameState.draw_reason === "insufficient_material") text = "기물 부족 무승부";
                        else text = "무승부";
                    } else if (gameState.check) {
                        text = data.turn === "W" ? "백 체크" : "흑 체크";
                    } else {
                        text = data.turn === "W" ? "백 턴" : "흑 턴";
                    }

                    gameEnded = endedNow;
                    if (gameEnded || data.turn !== myColor) selected = null;
                    status.innerText = text;

                    if (gameEnded || data.clock?.ended) stopClockTicker();
                    if (gameEnded) showGameOverModal(text);
                    else hideGameOverModal();
                }

                function renderEmptyBoard() {
                    const boardDiv = document.getElementById("board");
                    boardDiv.innerHTML = "";

                    for (let y = 0; y < 8; y++) {
                        for (let x = 0; x < 8; x++) {
                            const cell = document.createElement("div");
                            cell.className = "cell " + (((x + y) % 2 === 0) ? "white" : "black");
                            boardDiv.appendChild(cell);
                        }
                    }

                    hideGameOverModal();
                }

                async function createRoom() {
                    const res = await fetch(`${API_BASE}/create_room`, { method: "POST" });
                    const data = await res.json();

                    roomId = data.room_id;
                    setRoomToUrl(roomId);
                    updateRoomBox();

                    selected = null;
                    gameEnded = false;
                    augmentShownThisGame = false;
                    hideAugmentOverlay();

                    await joinCurrentRoom();
                    await loadBoard();
                    connectSocket();
                }

                async function joinRoom() {
                    const input = document.getElementById("roomInput").value.trim().toUpperCase();
                    if (!input) return;

                    roomId = input;
                    setRoomToUrl(roomId);
                    updateRoomBox();

                    selected = null;
                    gameEnded = false;
                    augmentShownThisGame = false;
                    hideAugmentOverlay();

                    await joinCurrentRoom();
                    await loadBoard();
                    connectSocket();
                }

                async function joinCurrentRoom() {
                    if (!roomId) return;

                    const res = await fetch(`${API_BASE}/rooms/${roomId}/join`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ player_id: playerId })
                    });

                    if (!res.ok) {
                        myColor = null;
                        updateColorBox();
                        return;
                    }

                    const data = await res.json();
                    myColor = data.color;
                    updateColorBox();
                }
                function isMyGuardianTurn() {
                    return guardianMode && guardianState && guardianState.current === myColor;
                }

                function renderBoardFromState(data) {
                    currentState = data;
                    currentBoard = data.board;

                    setTurnCounterUI(data.move_count);
                    setStatusUI(data);
                    setClockUI(data.clock);
                    updateRematchButton(data.rematch);

                    const augmentState = data.augment;
                    const guardian = data.guardian || null;
                    guardianMode = !!guardian?.active;
                    guardianState = guardian;

                    if (augmentState?.owned) {
                        if (myColor === "W" || myColor === "B") {
                            myOwnedAugments = augmentState.owned[myColor] ?? [];
                            const enemyColor = myColor === "W" ? "B" : "W";
                            enemyOwnedAugments = augmentState.owned[enemyColor] ?? [];
                        } else {
                            myOwnedAugments = [];
                            enemyOwnedAugments = [];
                        }

                        renderOwnedAugments();
                    }

                    if (
                        augmentState?.active &&
                        !augmentShownThisGame &&
                        !gameEnded &&
                        (myColor === "W" || myColor === "B")
                    ) {
                        augmentShownThisGame = true;

                        const myChoices = augmentState.choices?.[myColor] ?? [];

                        showAugmentOverlay({
                            tier: augmentState.tier || "gold",
                            myTurn: augmentState.selected?.[myColor] == null,
                            options: myChoices,
                            durationMs: 25000
                        });
                    }

                    if (!augmentState?.active && augmentOpen) {
                        hideAugmentOverlay();
                        augmentShownThisGame = false;
                    }

                    if (data.clock?.ended || gameEnded) stopClockTicker();
                    else startClockTicker();

                    const boardDiv = document.getElementById("board");
                    boardDiv.innerHTML = "";

                    const gameState = currentState.game_state;
                    const checkedColor = gameState.check ? data.turn : null;
                    const winnerColor = gameState.checkmate ? data.winner : null;

                    for (let displayY = 0; displayY < 8; displayY++) {
                        for (let displayX = 0; displayX < 8; displayX++) {
                            const pos = displayToBoard(displayX, displayY);
                            const x = pos.x;
                            const y = pos.y;

                            const cell = document.createElement("div");
                            cell.className = "cell " + (((displayX + displayY) % 2 === 0) ? "white" : "black");
                            cell.onclick = () => handleClick(x, y);

                            const piece = currentBoard[y][x];

                            if (selected && selected.x === x && selected.y === y) {
                                cell.classList.add("selected");
                            }

                            if (piece && piece.name === "K") {
                                if (checkedColor === piece.color) {
                                    const ring = document.createElement("div");
                                    ring.className = "check-king";
                                    cell.appendChild(ring);
                                }

                                if (winnerColor === piece.color) {
                                    const ring = document.createElement("div");
                                    ring.className = "winner-king";
                                    cell.appendChild(ring);
                                }
                            }

                            if (selected && isPossibleMove(selected.x, selected.y, x, y)) {
                                const selectedPiece = currentBoard[selected.y][selected.x];
                                const target = currentBoard[y][x];
                                const isPawnEp = selectedPiece && selectedPiece.name === "P" && x !== selected.x && !target;

                                if ((target && selectedPiece && target.color !== selectedPiece.color) || isPawnEp) {
                                    const ring = document.createElement("div");
                                    ring.className = "capture-ring";
                                    cell.appendChild(ring);
                                } else {
                                    const dot = document.createElement("div");
                                    dot.className = "move-dot";
                                    cell.appendChild(dot);
                                }
                            }

                            if (piece) {
                                const img = document.createElement("img");
                                img.src = `pieces/${piece.color.toLowerCase()}${piece.name.toLowerCase()}.png`;
                                img.draggable = false;
                                img.ondragstart = () => false;
                                cell.appendChild(img);
                            }

                            boardDiv.appendChild(cell);
                        }
                        updateGuardianUI();
                    }
                }

                async function loadBoard() {
                    if (!roomId) {
                        renderEmptyBoard();
                        return;
                    }

                    try {
                        const res = await fetch(`${API_BASE}/rooms/${roomId}/state`);
                        if (!res.ok) return;

                        const data = await res.json();
                        renderBoardFromState(data);
                    } catch (err) {
                        console.error(err);
                    }
                }

                function isPromotionMove(x1, y1, x2, y2) {
                    const piece = currentBoard?.[y1]?.[x1];
                    if (!piece || piece.name !== "P") return false;
                    return (piece.color === "W" && y2 === 0) || (piece.color === "B" && y2 === 7);
                }

                function askPromotionPiece() {
                    const input = prompt("프로모션 선택: Q, R, B, N", "Q");
                    const value = (input || "Q").trim().toUpperCase();
                    if (["Q", "R", "B", "N"].includes(value)) return value;
                    return "Q";
                }

                function handleClick(x, y) {
                    if (augmentOpen) return;
                    if (guardianMode) {
                        handleGuardianClick(x, y);
                        return;
                    }
                    if (gameEnded || !roomId || !myColor || myColor === "S") return;
                    if (!currentState || !currentBoard) return;
                    if (myColor !== currentState.turn) return;

                    const piece = currentBoard[y][x];

                    if (selected === null) {
                        if (!piece || piece.color !== myColor) return;
                        selected = { x, y };
                        renderBoardFromState(currentState);
                        return;
                    }

                    if (piece && piece.color === myColor) {
                        selected = { x, y };
                        renderBoardFromState(currentState);
                        return;
                    }

                    movePiece(selected.x, selected.y, x, y);
                }

                async function movePiece(x1, y1, x2, y2) {
                    if (augmentOpen) return;
                    if (gameEnded || !roomId || !myColor || myColor === "S") return;

                    let promotion = "Q";
                    if (isPromotionMove(x1, y1, x2, y2)) {
                        promotion = askPromotionPiece();
                    }

                    try {
                        const res = await fetch(`${API_BASE}/rooms/${roomId}/move`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ x1, y1, x2, y2, player_id: playerId, promotion })
                        });

                        const data = await res.json();

                        if (data.result && data.result.success) {
                            selected = null;

                            if (data.state) {
                                renderBoardFromState(data.state);
                            }

                            return;
                        }

                        if (data.result && data.result.message) {
                            const status = document.getElementById("status");
                            if (status) status.innerText = data.result.message;
                        }
                    } catch (err) {
                        console.error(err);
                    }
                }

                function isPossibleMove(x1, y1, x2, y2) {
                    const piece = currentBoard[y1]?.[x1];
                    const target = currentBoard[y2]?.[x2];

                    if (!piece) return false;
                    if (x1 === x2 && y1 === y2) return false;
                    if (target && target.color === piece.color) return false;

                    const dx = x2 - x1;
                    const dy = y2 - y1;
                    const adx = Math.abs(dx);
                    const ady = Math.abs(dy);

                    if (piece.name === "P") {
                        const direction = piece.color === "W" ? -1 : 1;
                        const startRow = piece.color === "W" ? 6 : 1;
                        const hasPawnRetreat = !!currentState?.effects?.[piece.color]?.pawn_retreat;
                        const slowCount = Number(currentState?.effects?.[piece.color]?.pawn_slow ?? 0);

                        if (dx === 0 && dy === direction && !target) return true;

                        if (hasPawnRetreat && dx === 0 && dy === -direction && !target) return true;

                        if (
                            dx === 0 &&
                            y1 === startRow &&
                            dy === 2 * direction &&
                            !target &&
                            currentBoard[y1 + direction][x1] === null
                        ) {
                            if (slowCount > 0) return false;
                            return true;
                        }

                        if (adx === 1 && dy === direction && target && target.color !== piece.color) return true;

                        if (adx === 1 && dy === direction && !target && currentState?.last_move) {
                            const [lx1, ly1, lx2, ly2] = currentState.last_move;
                            const moved = currentBoard[ly2]?.[lx2];
                            if (
                                moved &&
                                moved.name === "P" &&
                                moved.color !== piece.color &&
                                Math.abs(ly2 - ly1) === 2 &&
                                ly2 === y1 &&
                                lx2 === x2
                            ) return true;
                        }

                        return false;
                    }

                    if (piece.name === "N") {
                        return (adx === 2 && ady === 1) || (adx === 1 && ady === 2);
                    }

                    if (piece.name === "K") {
                        if (adx <= 1 && ady <= 1) return true;

                        const effects = currentState?.effects || {};

                        // 왕권 강화 2칸 이동
                        if (effects[piece.color]?.king_buff) {
                            if ((adx === 2 && ady === 0) || (adx === 0 && ady === 2)) {
                                const midX = x1 + (dx / 2);
                                const midY = y1 + (dy / 2);

                                if (currentBoard[midY][midX] !== null) return false;
                                return true;
                            }
                        }

                        // 왕권 강화가 없을 때만 캐슬링 초록원
                        if (ady === 0 && adx === 2) {
                            if (effects[piece.color]?.no_castling) return false;

                            const row = piece.color === "W" ? 7 : 0;
                            if (y1 !== row || x1 !== 4) return false;

                            const kingside = x2 > x1;
                            const rookX = kingside ? 7 : 0;
                            const between = kingside ? [5, 6] : [1, 2, 3];

                            const rook = currentBoard[row]?.[rookX];
                            if (!rook || rook.name !== "R" || rook.color !== piece.color) return false;

                            for (const xx of between) {
                                if (currentBoard[row][xx] !== null) return false;
                            }

                            return true;
                        }

                        return false;
                    }

                    if (piece.name === "R") {
                        if (x1 !== x2 && y1 !== y2) return false;
                        return isPathClear(x1, y1, x2, y2);
                    }

                    if (piece.name === "B") {
                        if (adx !== ady) return false;
                        return isPathClear(x1, y1, x2, y2);
                    }

                    if (piece.name === "Q") {
                        if (x1 === x2 || y1 === y2 || adx === ady) {
                            return isPathClear(x1, y1, x2, y2);
                        }
                        return false;
                    }

                    return false;
                }

                function isPathClear(x1, y1, x2, y2) {
                    const stepX = x2 === x1 ? 0 : (x2 > x1 ? 1 : -1);
                    const stepY = y2 === y1 ? 0 : (y2 > y1 ? 1 : -1);

                    let x = x1 + stepX;
                    let y = y1 + stepY;

                    while (x !== x2 || y !== y2) {
                        if (currentBoard[y][x] !== null) return false;
                        x += stepX;
                        y += stepY;
                    }

                    return true;
                }

                async function requestRematch() {
                    if (!roomId || !playerId || !gameEnded) return;

                    try {
                        const res = await fetch(`${API_BASE}/rooms/${roomId}/rematch`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ player_id: playerId })
                        });

                        if (!res.ok) return;

                        const data = await res.json();

                        if (data.started) {
                            selected = null;
                            gameEnded = false;
                            await joinCurrentRoom();
                            updateColorBox();
                            augmentShownThisGame = false;
                            hideAugmentOverlay();
                        }

                        if (data.state) {
                            renderBoardFromState(data.state);
                        }
                    } catch (err) {
                        console.error(err);
                    }
                }

                function leaveRoom() {
                    roomId = null;
                    myColor = null;
                    currentBoard = null;
                    currentState = null;
                    selected = null;
                    gameEnded = false;
                    ownedAugments = [];
                    enemyOwnedAugments = [];
                    myOwnedAugments = [];
                    renderOwnedAugments();
                    augmentOpen = false;
                    augmentShownThisGame = false;
                    hideAugmentOverlay();

                    setRoomToUrl(null);
                    updateRoomBox();
                    updateColorBox();

                    document.getElementById("status").innerText = "방을 만들거나 참가해";
                    document.getElementById("roomInput").value = "";

                    setClockUI({ W: 600, B: 600 });
                    hideGameOverModal();
                    hideAugmentOverlay();
                    renderEmptyBoard();
                    stopClockTicker();
                    setTurnCounterUI(0);

                    if (socket) {
                        socket.onclose = null;
                        socket.close();
                        socket = null;
                    }
                }

                /* ===== augment ui functions ===== */
                function tierLabel(tier) {
                    if (tier === "silver") return "실버";
                    if (tier === "gold") return "골드";
                    if (tier === "diamond") return "다이아";
                    return "증강";
                }

                function normalizeTier(tier) {
                    if (tier === "silver" || tier === "gold" || tier === "diamond") return tier;
                    return "silver";
                }

                function buildAugmentCard(option, index) {
                    const tier = normalizeTier(option?.tier);
                    const title = option?.title || `증강 ${index + 1}`;
                    const description = option?.description || "설명이 아직 없습니다.";
                    const icon = option?.icon || "";

                    const card = document.createElement("div");
                    card.className = `augment-card ${tier}`;
                    card.dataset.index = String(index);
                    card.dataset.tier = tier;

                    card.innerHTML = `
        <div class="augment-card-body">
            <div class="augment-card-title">${title}</div>
            <div class="augment-card-art">
                ${icon ? `<img src="${icon}" alt="${title}" class="augment-card-icon">` : ""}
            </div>
            <div class="augment-card-desc">${description}</div>
        </div>
    `;

                    card.onclick = () => selectAugment(index);
                    return card;
                }

                function setAugmentStatus(text) {
                    const el = document.getElementById("augmentStatus");
                    if (el) el.innerText = text;
                }

                function clearAugmentTimer() {
                    if (augmentTimerId) {
                        clearTimeout(augmentTimerId);
                        augmentTimerId = null;
                    }
                    if (augmentAutoPickId) {
                        clearTimeout(augmentAutoPickId);
                        augmentAutoPickId = null;
                    }
                }

                function setAugmentBarTier(tier) {
                    const bar = document.getElementById("augmentBar");
                    if (!bar) return;
                    bar.className = "";
                    bar.classList.add(normalizeTier(tier));
                }

                function startAugmentTimer(durationMs) {
                    const bar = document.getElementById("augmentBar");
                    if (!bar) return;

                    clearAugmentTimer();

                    bar.style.transition = "none";
                    bar.style.width = "100%";
                    void bar.offsetWidth;

                    bar.style.transition = `width ${durationMs}ms linear`;
                    bar.style.width = "0%";

                    augmentAutoPickId = setTimeout(() => {
                        if (!augmentOpen || augmentLocked) return;
                        selectAugment(0, true);
                    }, durationMs);
                }

                function renderAugmentCards(options) {
                    const wrap = document.getElementById("augmentCards");
                    if (!wrap) return;

                    wrap.innerHTML = "";

                    options.forEach((option, index) => {
                        const card = buildAugmentCard(option, index);
                        wrap.appendChild(card);
                    });

                    requestAnimationFrame(() => {
                        [...wrap.children].forEach((card) => {
                            card.classList.add("show");
                        });
                    });
                }

                function disableAugmentCards() {
                    const cards = document.querySelectorAll(".augment-card");
                    cards.forEach(card => card.classList.add("disabled"));
                }

                function highlightSelectedAugment(index) {
                    const cards = document.querySelectorAll(".augment-card");
                    cards.forEach(card => card.classList.remove("selected-card"));
                    const target = [...cards].find(card => Number(card.dataset.index) === index);
                    if (target) target.classList.add("selected-card");
                }

                function showAugmentOverlay({
                    tier = "silver",
                    myTurn = true,
                    options = DEBUG_AUGMENTS,
                    durationMs = 25000
                } = {}) {
                    const overlay = document.getElementById("augmentOverlay");
                    const rightPanel = document.getElementById("rightSidePanel");
                    if (!overlay) return;

                    augmentOpen = true;
                    augmentLocked = false;
                    selectedAugmentIndex = null;

                    overlay.style.display = "";
                    overlay.classList.add("show");
                    setAugmentBarTier(tier);

                    if (myTurn) setAugmentStatus("증강을 선택하세요");
                    else setAugmentStatus("상대가 증강을 고르는 중...");

                    setTimeout(() => {
                        renderAugmentCards(options);

                        const bar = document.getElementById("augmentBar");
                        if (!bar) return;

                        if (myTurn) {
                            startAugmentTimer(durationMs);
                        } else {
                            disableAugmentCards();
                            clearAugmentTimer();
                            bar.style.transition = "none";
                            bar.style.width = "100%";
                        }
                    }, 100);
                }

                function hideAugmentOverlay() {
                    const overlay = document.getElementById("augmentOverlay");
                    const cards = document.getElementById("augmentCards");
                    const bar = document.getElementById("augmentBar");
                    const rightPanel = document.getElementById("rightSidePanel");

                    clearAugmentTimer();

                    if (augmentCloseTimeout) {
                        clearTimeout(augmentCloseTimeout);
                        augmentCloseTimeout = null;
                    }

                    if (overlay) {
                        overlay.classList.remove("show");
                        overlay.style.display = "";
                    }

                    if (cards) cards.innerHTML = "";

                    if (bar) {
                        bar.style.transition = "none";
                        bar.style.width = "100%";
                    }

                    augmentOpen = false;
                    augmentLocked = false;
                    selectedAugmentIndex = null;

                    const statusEl = document.getElementById("augmentStatus");
                    if (statusEl) statusEl.innerText = "증강을 선택하세요";
                }



                async function submitAugmentSelection(index, autoPicked = false) {
                    const options = currentState?.augment?.choices?.[myColor] ?? [];
                    const picked = options[index];
                    if (!picked) throw new Error("augment option not found");

                    const res = await fetch(`${API_BASE}/rooms/${roomId}/augment/select`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            player_id: playerId,
                            augment_id: picked.id
                        })
                    });

                    if (!res.ok) {
                        throw new Error("augment select failed");
                    }

                    return await res.json();
                }

                async function selectAugment(index, autoPicked = false) {
                    if (!augmentOpen || augmentLocked) return;
                    if (selectedAugmentIndex !== null) return;

                    selectedAugmentIndex = index;
                    augmentLocked = true;

                    clearAugmentTimer();
                    highlightSelectedAugment(index);
                    disableAugmentCards();

                    if (autoPicked) {
                        setAugmentStatus("시간 초과! 왼쪽 증강이 자동 선택되었습니다");
                    } else {
                        setAugmentStatus("선택 완료! 상대가 고르는 중...");
                    }

                    try {
                        const result = await submitAugmentSelection(index, autoPicked);

                        if (result?.both_done) {
                            hideAugmentOverlay();
                            startClockTicker();
                        } else {
                            setAugmentWaiting(true);
                        }

                        if (result?.state) {
                            currentState = result.state;
                            renderBoardFromState(result.state);
                        }
                    } catch (err) {
                        console.error(err);
                    }
                }

                function renderOwnedAugments() {
                    const enemySlots = document.querySelectorAll('.owned-augment-slot[data-side="enemy"]');
                    const mySlots = document.querySelectorAll('.owned-augment-slot[data-side="my"]');

                    enemySlots.forEach((slot, index) => {
                        slot.innerHTML = "";
                        slot.className = "owned-augment-slot enemy-slot";
                        slot.onclick = null;

                        const aug = enemyOwnedAugments[index];
                        if (!aug) return;

                        slot.classList.add("filled");
                        slot.classList.add(aug.tier);

                        slot.innerHTML = `
            <div class="owned-augment-mini-title">${aug.title}</div>
            <div class="owned-augment-mini-art">
                ${aug.icon ? `<img src="${aug.icon}" alt="${aug.title}" class="owned-augment-mini-icon">` : ""}
            </div>
        `;

                        slot.onclick = () => openOwnedAugmentDetail(aug);
                    });

                    mySlots.forEach((slot, index) => {
                        slot.innerHTML = "";
                        slot.className = "owned-augment-slot my-slot";
                        slot.onclick = null;

                        const aug = myOwnedAugments[index];
                        if (!aug) return;

                        slot.classList.add("filled");
                        slot.classList.add(aug.tier);

                        slot.innerHTML = `
            <div class="owned-augment-mini-title">${aug.title}</div>
            <div class="owned-augment-mini-art">
                ${aug.icon ? `<img src="${aug.icon}" alt="${aug.title}" class="owned-augment-mini-icon">` : ""}
            </div>
        `;

                        slot.onclick = () => openOwnedAugmentDetail(aug);
                    });
                }

                function openOwnedAugmentDetail(aug) {
                    if (!aug) return;

                    const overlay = document.getElementById("ownedAugmentOverlay");
                    const card = document.getElementById("ownedAugmentCard");
                    const title = document.getElementById("ownedAugmentTitle");
                    const desc = document.getElementById("ownedAugmentDesc");
                    const art = document.getElementById("ownedAugmentArt");

                    if (!overlay || !card || !title || !desc || !art) {
                        console.error("owned augment detail elements not found");
                        return;
                    }

                    card.className = "";
                    card.id = "ownedAugmentCard";
                    if (aug.tier) card.classList.add(aug.tier);

                    title.innerText = aug.title || "";
                    desc.innerText = aug.description || "";
                    art.innerHTML = aug.icon ? `<img src="${aug.icon}" alt="${aug.title || ''}" class="owned-augment-big-icon">` : "";

                    overlay.classList.add("show");
                }

                function closeOwnedAugmentDetail() {
                    const overlay = document.getElementById("ownedAugmentOverlay");
                    if (overlay) overlay.classList.remove("show");
                }

                function openDebugAugment() {
                    showAugmentOverlay({
                        tier: "gold",
                        myTurn: true,
                        options: [
                            {
                                tier: "gold",
                                title: "캐슬링 금지",
                                description: "상대는 이번 게임에서 캐슬링을 할 수 없습니다."
                            },
                            {
                                tier: "gold",
                                title: "언더 프로모션!!",
                                description: "상대는 퀸으로 프로모션 할 수 없습니다."
                            },
                            {
                                tier: "gold",
                                title: "모든 폰 둔화",
                                description: "상대의 폰은 시작할 때 2칸 전진할 수 없습니다."
                            }
                        ],
                        durationMs: 25000
                    });
                }

                /* ===== init ===== */
                document.addEventListener("dragstart", (e) => {
                    if (e.target.tagName === "IMG") {
                        e.preventDefault();
                    }
                });

                const roomInputEl = document.getElementById("roomInput");
                if (roomInputEl) {
                    roomInputEl.addEventListener("keydown", (e) => {
                        if (e.key === "Enter") {
                            e.preventDefault();
                            joinRoom();
                        }
                    });
                }

                ensurePlayerId();
                renderEmptyBoard();
                renderOwnedAugments();
                setClockUI({
                    W: 600,
                    B: 600,
                    running: null,
                    ended: false,
                    last_update: Date.now() / 1000
                });

                setTurnCounterUI(0);

                roomId = getRoomFromUrl();
                updateRoomBox();
                updateColorBox();

                if (roomId) {
                    joinCurrentRoom().then(() => {
                        loadBoard();
                        connectSocket();
                    });
                }

                function setTurnCounterUI(moveCount) {
                    const turnBox = document.getElementById("turnCounter");
                    if (!turnBox) return;

                    const turnNumber = Math.floor(Number(moveCount ?? 0) / 2) + 1;
                    turnBox.innerText = `턴 수 : ${turnNumber}`;
                }

                function updateGuardianUI() {
                    const overlay = document.getElementById("guardianOverlay");
                    const statusEl = document.getElementById("guardianStatus");
                    const scoreEl = document.getElementById("guardianScore");
                    const confirmBtn = document.getElementById("guardianConfirmBtn");

                    if (!overlay) return;

                    if (!guardianMode || !guardianState) {
                        overlay.classList.remove("show");
                        return;
                    }

                    overlay.classList.add("show");

                    const current = guardianState.current;
                    const currentText = current === "W" ? "백" : current === "B" ? "흑" : "?";

                    if (isMyGuardianTurn()) {
                        if (!guardianState.selected_self) {
                            statusEl.innerText = `${currentText}의 균형의 수호자 - 내 기물 선택`;
                        } else {
                            statusEl.innerText = `${currentText}의 균형의 수호자 - 상대 기물 선택`;
                        }
                    } else {
                        statusEl.innerText = `${currentText}의 균형의 수호자 진행 중...`;
                    }

                    scoreEl.innerText = `점수: ${guardianState.score || 0} / ${guardianState.max_score || 0}`;

                    if (confirmBtn) {
                        confirmBtn.disabled = !isMyGuardianTurn() || !guardianState.selected_self;
                    }
                }

                function handleGuardianClick(x, y) {
                    if (!isMyGuardianTurn()) return;

                    console.log("guardian click:", x, y);
                }

                async function confirmGuardian() {
                    if (!isMyGuardianTurn()) return;
                    console.log("guardian confirm");
                }

            </script>
            <div id="ownedAugmentOverlay" onclick="closeOwnedAugmentDetail()">
                <button id="ownedAugmentClose" onclick="event.stopPropagation(); closeOwnedAugmentDetail()">×</button>

                <div id="ownedAugmentCard" class="silver" onclick="event.stopPropagation()">
                    <div id="ownedAugmentTitle"></div>
                    <div id="ownedAugmentArt"></div>
                    <div id="ownedAugmentDesc"></div>
                </div>
            </div>
</body>

</html>
